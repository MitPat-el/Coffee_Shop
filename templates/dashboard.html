{% extends "layout.html" %}

{% block body %}
<h1>{{ role }} Dashboard</h1>

<p>Welcome, {{ role }} {{ name }}!</p>

<div class="dashboard-actions">
    <!-- Barista only action -->
    {% if role == "Barista" %}
    <div class="action-group">
        <h2>Orders</h2>
        <a href="/order">
            <button class="action-button">New Order</button>
        </a>
    </div>
    {% endif %}
    
    {% if role == "Manager" %}
    <!-- Manager-Only Actions -->
    <div class="action-group">
        <h2>Management</h2>
        <a href="/manage_employees">
            <button class="action-button">Manage Employees</button>
        </a>
        <a href="/promotions">
            <button class="action-button">Manage Promotions</button>
        </a>
        <a href="/ingredients">
            <button class="action-button">Manage Ingredients</button>
        </a>
    </div>
    
    <div class="action-group">
        <h2>Reports</h2>
        <a href="/reports/accounting">
            <button class="action-button">Accounting Reports</button>
        </a>

        <a href="/reports/revenue">
            <button class="action-button">Revenue Report</button>
        </a>

        <a href="/reports/popular_items">
            <button class="action-button">Top Most Popular Items</button>
        </a>

        <a href="/reports/revenue_drinks">
            <button class="action-button">Top Revenue Generating Drinks</button>
        </a>
        
    </div>
    {% endif %}
</div>

<form action="/logout" method="post" class="logout-form">
    <button type="submit" class="logout-button">Logout</button>
</form>

<style>
    .dashboard-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        margin-bottom: 30px;
    }
    
    .action-group {
        background-color: #f8f9fa;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 15px;
        min-width: 200px;
    }
    
    .action-group h2 {
        margin-top: 0;
        border-bottom: 1px solid #dee2e6;
        padding-bottom: 10px;
        margin-bottom: 15px;
    }
    
    .action-button {
        display: block;
        width: 100%;
        padding: 10px;
        margin-bottom: 10px;
        text-align: left;
        background-color: #fff;
        border: 1px solid #ced4da;
        border-radius: 4px;
        cursor: pointer;
    }
    
    .action-button:hover {
        background-color: #e9ecef;
    }
    
    .logout-form {
        margin-top: 20px;
    }
    
    .logout-button {
        background-color: #f8d7da;
        border: 1px solid #f5c6cb;
        padding: 8px 15px;
        border-radius: 4px;
    }
</style>
{% endblock %}
